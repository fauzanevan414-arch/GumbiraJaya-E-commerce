<h1>Daftar Produk</h1>

<input type="text" id="searchBox" placeholder="Cari produk..." onkeyup="cariProduk()">

<ul id="produkList">
  <li>Baut</li>
  <li>Knalpot</li>
  <li>wadahplat</li>
  <li>Per Standar</li>
</ul>

<script>
  function cariProduk() {
    let input = document.getElementById("searchBox").value.toLowerCase();
    let list = document.getElementById("produkList").getElementsByTagName("li");

    for (let i = 0; i < list.length; i++) {
      let item = list[i].textContent.toLowerCase();
      list[i].style.display = item.includes(input) ? "" : "none";
    }
  }
</script>
